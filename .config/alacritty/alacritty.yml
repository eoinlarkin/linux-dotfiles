env:
  TERM: xterm-256color
#TERM: alacritty
#  LANG: en_GB.UTF-8
#  LC_CTYPE: en_GB.UTF-8	
font:
  normal:
    family: monospace
    style: Regular
  size: 10
  use_thin_strokes: true
colors:
  # Default colors
  primary:
    background: '#282a36'
    foreground: '#f8f8f2'

  # Normal colors
  normal:
    black: '#000000'
    red: '#ff5555'
    green: '#50fa7b'
    yellow: '#f1fa8c'
    blue: '#caa9fa'
    magenta: '#ff79c6'
    cyan: '#8be9fd'
    white: '#bfbfbf'

  # Bright colors
  bright:
    black: '#575b70'
    red: '#ff6e67'
    green: '#5af78e'
    yellow: '#f4f99d'
    blue: '#caa9fa'
    magenta: '#ff92d0'
    cyan: '#9aedfe'
    white: '#e6e6e6'
background_opacity: 0.95
window.opacity: 1
